services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 1s
      timeout: 5s
      retries: 5

  app:
    profiles:
      - dev
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - .:/app
    restart: always
    command: ["go", "run", "main.go"]

  load-test:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile
      target: load-test
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    restart: "no"

volumes:
  data: